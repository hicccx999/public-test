name: Extract Base Pankou

on:
  workflow_dispatch:
    inputs:
      dates:
        description: "日期: YYYYMMDD 或 YYYYMMDD~YYYYMMDD, 多个逗号分隔, 留空=当天"
        required: false
        type: string
      force:
        description: "强制提取 (已存在也重新提取)"
        required: false
        type: boolean
        default: false
  # schedule:
  #   - cron: "30 8 * * 1-5"  # UTC 8:30 = 北京 16:30

env:
  PYTHON_VERSION: "3.11"

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Parse dates
        id: dates
        run: |
          INPUT="${{ inputs.dates }}"
          if [ -z "$INPUT" ]; then
            INPUT=$(TZ=Asia/Shanghai date +%Y%m%d)
          fi

          DATES=""
          IFS=',' read -ra PARTS <<< "$INPUT"
          for part in "${PARTS[@]}"; do
            part=$(echo "$part" | xargs)
            if [[ "$part" == *"~"* ]]; then
              START=$(echo "$part" | cut -d'~' -f1)
              END=$(echo "$part" | cut -d'~' -f2)
              CUR="$START"
              while [[ "$CUR" -le "$END" ]]; do
                DATES="${DATES:+$DATES }$CUR"
                CUR=$(date -d "${CUR:0:4}-${CUR:4:2}-${CUR:6:2} + 1 day" +%Y%m%d)
              done
            else
              DATES="${DATES:+$DATES }$part"
            fi
          done

          echo "all=$DATES" >> "$GITHUB_OUTPUT"
          echo "📅 待处理日期: $DATES"

      - name: Checkout public-test
        uses: actions/checkout@v4
        with:
          path: public-test

      - name: Checkout stock-grabber
        uses: actions/checkout@v4
        with:
          repository: hiyishui/stock-grabber
          token: ${{ secrets.GRABBER_PAT }}
          ref: main
          path: stock-grabber
          sparse-checkout: |
            tools
            data/gb
            hicccx999

      - name: Checkout stock-mining
        uses: actions/checkout@v4
        with:
          repository: hicccx999/stock-mining
          token: ${{ secrets.HICCC_PAT }}
          ref: main
          path: stock-mining
          sparse-checkout: mining

      - name: 诊断 LARKSELF_TOKEN
        run: |
          echo "--- 1. Token 是否为空 ---"
          if [ -z "${{ secrets.LARKSELF_TOKEN }}" ]; then
            echo "::error::LARKSELF_TOKEN 为空！请在 Settings → Secrets 中配置"
            exit 1
          fi
          echo "Token 已设置 (长度: $(echo -n '${{ secrets.LARKSELF_TOKEN }}' | wc -c))"

          echo "--- 2. Token 身份验证 ---"
          curl -sf -H "Authorization: token ${{ secrets.LARKSELF_TOKEN }}" \
            https://api.github.com/user | jq '{login, id}' || echo "::error::Token 无法通过 GitHub API 认证"

          echo "--- 3. 访问 larkself/gp-features ---"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${{ secrets.LARKSELF_TOKEN }}" \
            https://api.github.com/repos/larkself/gp-features)
          echo "HTTP 状态码: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::无法访问 larkself/gp-features (HTTP $HTTP_CODE)"
            curl -s -H "Authorization: token ${{ secrets.LARKSELF_TOKEN }}" \
              https://api.github.com/repos/larkself/gp-features | jq '{message, documentation_url}'
          fi

      - name: Clone gp-features
        run: |
          git clone --depth 1 \
            "https://x-access-token:${{ secrets.LARKSELF_TOKEN }}@github.com/larkself/gp-features.git" \
            .work/gp-features

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install numpy pandas pyarrow zstandard

      - name: Extract for each date
        id: extract
        run: |
          FORCE="${{ inputs.force }}"
          PROCESSED=0
          SKIPPED=0

          for DATE_COMPACT in ${{ steps.dates.outputs.all }}; do
            DATE_DASH="${DATE_COMPACT:0:4}-${DATE_COMPACT:4:2}-${DATE_COMPACT:6:2}"

            # Check if already extracted
            if [ "$FORCE" != "true" ] && [ -f ".work/gp-features/base/pankou/${DATE_COMPACT}.parquet" ]; then
              echo "⏭️ 跳过 $DATE_COMPACT (已存在)"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi

            echo "🔄 处理 $DATE_COMPACT ..."

            # Clone larkself date repo
            rm -rf .work/date-repo
            git clone --depth 1 --filter=blob:none --sparse \
              "https://x-access-token:${{ secrets.LARKSELF_TOKEN }}@github.com/larkself/${DATE_DASH}.git" \
              ".work/date-repo"
            cd .work/date-repo
            git sparse-checkout set raw/pankou
            git checkout
            cd ../..

            # Extract
            python3 stock-grabber/hicccx999/extract_base_pankou.py \
              --target-date "$DATE_DASH" \
              --dat-dir .work/date-repo \
              --output-dir .work/base/pankou \
              --grabber-dir stock-grabber \
              --mining-dir stock-mining

            # Copy to gp-features
            mkdir -p .work/gp-features/base/pankou
            cp .work/base/pankou/${DATE_COMPACT}.parquet .work/gp-features/base/pankou/

            PROCESSED=$((PROCESSED + 1))
            echo "✅ $DATE_COMPACT 完成"
          done

          echo "📊 处理: $PROCESSED, 跳过: $SKIPPED"
          echo "processed=$PROCESSED" >> "$GITHUB_OUTPUT"

      - name: Push to gp-features
        if: steps.extract.outputs.processed != '0'
        run: |
          cd .work/gp-features
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add base/pankou/
          git diff --cached --quiet || git commit -m "base/pankou: ${{ steps.dates.outputs.all }}"
          git push
