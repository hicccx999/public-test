name: 批次训练V2

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      gate_trials:
        description: "Gate 模型 Optuna trials"
        required: false
        default: "60"
        type: string
      stage_trials:
        description: "Stage 模型 Optuna trials"
        required: false
        default: "100"
        type: string
      folds:
        description: "Walk-forward folds"
        required: false
        default: "4"
        type: string
      exclude_days:
        description: "数据集排除最近N个交易日"
        required: false
        default: "20"
        type: string
      infer_secids:
        description: "训练后自动推理的股票列表(secid/代码, 逗号分隔, 留空=跳过推理)"
        required: false
        type: string
      infer_days:
        description: "推理最近N个交易日(仅 infer_secids 非空时生效)"
        required: false
        default: "20"
        type: string

env:
  TZ: Asia/Shanghai

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: 检出 public-test
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 检出 stock-mining
        uses: actions/checkout@v4
        with:
          repository: hiyishui/stock-mining
          token: ${{ secrets.GRABBER_PAT }}
          path: stock-mining
          ref: main
          fetch-depth: 0

      - name: 安装训练依赖
        run: |
          pip install --upgrade pip
          pip install numpy pandas scikit-learn lightgbm xgboost optuna pyarrow zstandard

      - name: 校验特征数据存在
        run: |
          set -Eeuo pipefail
          FEAT_DIR="$GITHUB_WORKSPACE/stock-mining/data/features"
          LABEL_DIR="$GITHUB_WORKSPACE/stock-mining/data/labels"

          FEAT_COUNT=$(find "$FEAT_DIR" -name '*.csv' 2>/dev/null | wc -l)
          LABEL_COUNT=$(find "$LABEL_DIR" -name '*.csv' 2>/dev/null | wc -l)

          if [[ "$FEAT_COUNT" -eq 0 ]]; then
            echo "::error::stock-mining/data/features 中无 CSV 文件，请先运行 V2特征工程 workflow"
            exit 1
          fi
          echo "特征文件: ${FEAT_COUNT}, 标签文件: ${LABEL_COUNT}"

      - name: 构建训练数据集
        env:
          EXCLUDE_DAYS: ${{ inputs.exclude_days }}
        run: |
          set -Eeuo pipefail
          STOCK_MINING="$GITHUB_WORKSPACE/stock-mining"

          (
            cd "$STOCK_MINING"
            PYTHONPATH="$STOCK_MINING:${PYTHONPATH:-}" python3 - <<'PY'
            from mining.ml.data_prep import prepare_dataset
            prepare_dataset(
                feat_dir="data/features",
                label_dir="data/labels",
                output_path="data/ml/dataset.parquet",
                exclude=[],
            )
          PY
          )

          python3 "$GITHUB_WORKSPACE/scripts/trim_dataset_recent_days.py" \
            --input "$STOCK_MINING/data/ml/dataset.parquet" \
            --output "$STOCK_MINING/data/ml/dataset_trainable.parquet" \
            --exclude-days "$EXCLUDE_DAYS"

          python3 - <<'PY'
          import pandas as pd, os
          p = os.path.join(os.environ["GITHUB_WORKSPACE"], "stock-mining/data/ml/dataset_trainable.parquet")
          df = pd.read_parquet(p)
          secids = df["secid"].nunique() if "secid" in df.columns else "N/A"
          print(f"数据集: 样本数={len(df)}, 列数={len(df.columns)}, 股票数={secids}")
          dates = sorted(df["date"].astype(str).unique()) if "date" in df.columns else []
          if dates:
              print(f"日期范围: {dates[0]} ~ {dates[-1]}, 交易日数={len(dates)}")
          PY

      - name: 训练 Gate 模型
        env:
          GATE_TRIALS: ${{ inputs.gate_trials }}
          FOLDS: ${{ inputs.folds }}
        run: |
          set -Eeuo pipefail
          cd "$GITHUB_WORKSPACE/stock-mining"
          PYTHONPATH="$GITHUB_WORKSPACE/stock-mining:${PYTHONPATH:-}" \
            python3 -m mining.ml.train_gate \
              --dataset "data/ml/dataset_trainable.parquet" \
              --output-dir "models/v2" \
              --trials "$GATE_TRIALS" \
              --folds "$FOLDS"

      - name: 训练 Stage 模型
        env:
          STAGE_TRIALS: ${{ inputs.stage_trials }}
          FOLDS: ${{ inputs.folds }}
        run: |
          set -Eeuo pipefail
          cd "$GITHUB_WORKSPACE/stock-mining"
          PYTHONPATH="$GITHUB_WORKSPACE/stock-mining:${PYTHONPATH:-}" \
            python3 -m mining.ml.train_stage \
              --dataset "data/ml/dataset_trainable.parquet" \
              --output-dir "models/v2" \
              --trials "$STAGE_TRIALS" \
              --folds "$FOLDS"

      - name: 校验模型产出
        run: |
          set -Eeuo pipefail
          test -f "$GITHUB_WORKSPACE/stock-mining/models/v2/gate_xgb.json"
          test -f "$GITHUB_WORKSPACE/stock-mining/models/v2/stage_lgbm.txt"
          echo "模型文件校验通过"

      - name: 提交训练模型到 stock-mining/models/v2
        run: |
          set -Eeuo pipefail
          cd "$GITHUB_WORKSPACE/stock-mining"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add models/v2/
          if git diff --staged --quiet; then
            echo "models/v2 无变化"
          else
            git commit -m "chore: 批次训练更新 V2 模型 ($(date +%F))"
            git push origin HEAD:main
          fi

      - name: 上传训练产物
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: train-v2-output
          path: |
            stock-mining/models/v2/*
            stock-mining/data/ml/dataset_trainable.parquet
          if-no-files-found: ignore
          retention-days: 7

  infer:
    needs: train
    if: ${{ inputs.infer_secids != '' }}
    uses: ./.github/workflows/infer-v2.yml
    with:
      infer_secids: ${{ inputs.infer_secids }}
      infer_days: ${{ inputs.infer_days || '20' }}
    secrets:
      GRABBER_PAT: ${{ secrets.GRABBER_PAT }}
      TARGET_REPO_OWNER: ${{ secrets.TARGET_REPO_OWNER }}
      TARGET_REPO_TOKEN: ${{ secrets.TARGET_REPO_TOKEN }}
