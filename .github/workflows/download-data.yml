name: 下载盘口数据
permissions:
  contents: write

on:
#   schedule:
#     - cron: '0 8 * * 1-5'  # UTC 08:00 = 北京 16:00, 工作日收盘后
  workflow_dispatch:
    inputs:
      date:
        description: '日期: YYYYMMDD 或 YYYYMMDD~YYYYMMDD, 多个逗号分隔, 留空=当天'
        required: false
        type: string
      codes:
        description: '股票代码(纯数字), 逗号分隔, 留空=全部'
        required: false
        type: string
      force:
        description: '强制重下载已完成的日期'
        required: false
        default: false
        type: boolean

env:
  TZ: Asia/Shanghai

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.matrix.outputs.should_run }}
      date: ${{ steps.matrix.outputs.date }}
      download_shard_mode: ${{ steps.matrix.outputs.download_shard_mode }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: 检出 stock-grabber
        uses: actions/checkout@v4
        with:
          repository: hiyishui/stock-grabber
          token: ${{ secrets.GRABBER_PAT }}

      - name: 生成分片矩阵
        id: matrix
        env:
          MODE: download
          DATE: ${{ inputs.date }}
          ONLY_CODES: ${{ inputs.codes }}
          FORCE: ${{ inputs.force }}
          DOWNLOAD_SHARD_MODE: auto
          DOWNLOAD_DAY_CHUNK_SIZE: "500"
          DOWNLOAD_MATRIX_MAX_JOBS: "256"
          EXCLUDE_BJ_STAR: "true"
        run: python3 scripts/prepare_matrix.py

  download:
    if: needs.prepare.outputs.should_run == 'true'
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: 检出 stock-grabber
        uses: actions/checkout@v4
        with:
          repository: hiyishui/stock-grabber
          token: ${{ secrets.GRABBER_PAT }}

      - name: 下载数据 (日期 ${{ matrix.date }}, 分片 ${{ matrix.shard }}, ${{ matrix.count }} 只)
        env:
          REPO_OWNER: larkself
          REPO_TOKEN: ${{ secrets.LARKSELF_PAT }}
          SECIDS: ${{ matrix.secids }}
          USE_ALL_SECIDS: ${{ matrix.all_secids }}
          EXCLUDE_BJ_STAR: "true"
          SHARD_ID: ${{ matrix.shard }}
          DATE: ${{ matrix.date }}
          FORCE: ${{ inputs.force }}
          CHECK_DAT_COMPLETENESS: "true"
          DAT_LAST_TS_MIN: "144500"
          DAT_ACTIVE_MIN_SIZE: "2000"
        run: python3 scripts/download_data.py

      - name: 上传分片数据
        if: success() && !cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: dat-${{ matrix.date }}-shard${{ matrix.shard }}
          path: data/dl_output/
          retention-days: 1
          compression-level: 0
          if-no-files-found: ignore

  collect-dates:
    if: needs.prepare.outputs.should_run == 'true' && !cancelled()
    needs: [prepare, download]
    runs-on: ubuntu-latest
    outputs:
      dates_matrix: ${{ steps.dates.outputs.matrix }}
    steps:
      - name: 提取唯一日期
        id: dates
        env:
          MATRIX_JSON: ${{ needs.prepare.outputs.matrix }}
        run: |
          DATES=$(python3 -c "
          import json, os
          matrix = json.loads(os.environ['MATRIX_JSON'])
          dates = sorted(set(item['date'] for item in matrix['include']))
          print(json.dumps({'include': [{'date': d} for d in dates]}))
          ")
          echo "matrix=${DATES}" >> "$GITHUB_OUTPUT"

  push:
    needs: [collect-dates]
    if: needs.collect-dates.result == 'success'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.collect-dates.outputs.dates_matrix) }}
    steps:
      - name: 检出 stock-grabber
        uses: actions/checkout@v4
        with:
          repository: hiyishui/stock-grabber
          token: ${{ secrets.GRABBER_PAT }}

      - name: 下载所有分片 artifact (${{ matrix.date }})
        uses: actions/download-artifact@v4
        with:
          pattern: dat-${{ matrix.date }}-*
          path: data/dl_output
          merge-multiple: true

      - name: 推送日期仓库 (${{ matrix.date }})
        env:
          REPO_OWNER: larkself
          REPO_TOKEN: ${{ secrets.LARKSELF_PAT }}
          DATA_DIR: data/dl_output
          PUSH_BATCH_SIZE: "500"
        run: python3 scripts/push_date_repo.py

  extract:
    needs: [push, collect-dates]
    if: needs.push.result == 'success'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.collect-dates.outputs.dates_matrix) }}
    uses: ./.github/workflows/extract-pankou-by-date.yml
    with:
      date: ${{ matrix.date }}
    secrets:
      GRABBER_PAT: ${{ secrets.GRABBER_PAT }}
      LARKSELF_PAT: ${{ secrets.LARKSELF_PAT }}
